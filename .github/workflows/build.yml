name: Build Tailwind HTML
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Project
        run: node build.js

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundled-html
          path: dist/
