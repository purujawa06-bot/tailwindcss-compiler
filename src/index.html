<!DOCTYPE html>
<html lang="id" x-data="puruTVApp()">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PurTV">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1038/1038100.png">
<link rel="manifest" href='data:application/manifest+json,{"name":"PurTV Donghua","short_name":"PurTV","description":"Refactored - Modern & Compact","start_url":".","display":"standalone","background_color":"#0f1117","theme_color":"#3b82f6","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/1038/1038100.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>
<title x-text="title">PurTV - Nonton Donghua Sub Indo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
[x-cloak]{display:none!important}
:root{--bg:#0f1117;--card:#161922;--card2:#1f232d;--blue:#3b82f6;--border:#1f2535}
body{background:var(--bg);padding-bottom:80px;scroll-behavior:smooth}
@media(min-width:768px){body{padding-bottom:20px}}
.aspect-poster{aspect-ratio:2/3}
.glass{background:rgba(22,25,34,.9);backdrop-filter:blur(15px)}
.grid-r{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
@media(min-width:640px){.grid-r{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.grid-r{grid-template-columns:repeat(5,1fr)}}
::-webkit-scrollbar{display:none}*{scrollbar-width:none;-ms-overflow-style:none}

/* Themes Global Override */
body{transition:background-color .3s,border-color .3s,color .3s}
body.theme-emerald{--blue:#10b981;--blue-rgb:16,185,129}
body.theme-purple{--blue:#a855f7;--blue-rgb:168,85,247}
body.theme-rose{--blue:#f43f5e;--blue-rgb:244,63,94}
body.theme-amber{--blue:#f59e0b;--blue-rgb:245,158,11}
body.theme-custom{--blue:var(--c-color);--blue-rgb:var(--c-rgb)}
body.theme-rainbow{--blue:var(--rb-1);--blue-rgb:var(--rb-1-rgb)}
body.theme-rainbow nav.glass{--blue:var(--rb-2);--blue-rgb:var(--rb-2-rgb)}
body.theme-rainbow header{--blue:var(--rb-3);--blue-rgb:var(--rb-3-rgb)}
body.theme-rainbow .card-poster:hover{border-color:var(--rb-4)!important}
body.theme-rainbow .ai-ring::before{background:linear-gradient(45deg, var(--rb-1), var(--rb-2), var(--rb-3))}

/* Force Tailwind classes to follow theme variable */
[class*="theme-"] .text-blue-400,[class*="theme-"] .text-blue-500,[class*="theme-"] .text-blue-600,
[class*="theme-"] .hover\:text-blue-400:hover,[class*="theme-"] .hover\:text-blue-500:hover{color:var(--blue)!important}

[class*="theme-"] .bg-blue-600,[class*="theme-"] .bg-blue-700,[class*="theme-"] .bg-blue-500,
[class*="theme-"] .hover\:bg-blue-600:hover,[class*="theme-"] .hover\:bg-blue-700:hover{background-color:var(--blue)!important}

[class*="theme-"] .border-blue-500,[class*="theme-"] .border-blue-600,[class*="theme-"] .hover\:border-blue-500:hover{border-color:var(--blue)!important}

[class*="theme-"] .bg-blue-600\/10,[class*="theme-"] .hover\:bg-blue-600\/10:hover{background-color:rgba(var(--blue-rgb),.1)!important}
[class*="theme-"] .bg-blue-600\/20,[class*="theme-"] .hover\:bg-blue-600\/20:hover{background-color:rgba(var(--blue-rgb),.2)!important}
[class*="theme-"] .border-blue-500\/20,[class*="theme-"] .border-blue-500\/50,[class*="theme-"] .border-blue-600\/40{border-color:rgba(var(--blue-rgb),.3)!important}
[class*="theme-"] .shadow-blue-600\/30,[class*="theme-"] .shadow-blue-500\/20{--tw-shadow-color:rgba(var(--blue-rgb),.4)!important}

.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.line-clamp-1{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}

/* AI Modal */
.ai-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:768px){.ai-overlay{align-items:center}}
.ai-panel{background:var(--card);border:1px solid rgba(59,130,246,.25);border-radius:2rem 2rem 0 0;width:100%;max-width:780px;max-height:85vh;overflow-y:auto;padding:2rem;animation:slideUp .35s cubic-bezier(.16,1,.3,1)}
@media(min-width:768px){.ai-panel{border-radius:2rem;max-height:80vh;margin:1rem}}

/* AI button ring */
.ai-ring{position:relative}
.ai-ring::before{content:'';position:absolute;inset:-3px;border-radius:inherit;background:linear-gradient(135deg,var(--blue),#6366f1,#06b6d4);z-index:-1;animation:hueRot 3s linear infinite;border-radius:1rem}
@keyframes hueRot{to{filter:hue-rotate(360deg)}}

/* Markdown */
.md-content{color:#d1d5db;line-height:1.75;font-size:.9rem}
.md-content h1,.md-content h2,.md-content h3,.md-content h4{font-weight:900;color:#f9fafb;margin:1.25rem 0 .5rem}
.md-content h3{font-size:1rem;color:#60a5fa;text-transform:uppercase;letter-spacing:.05em}
.md-content h2{font-size:1.1rem}
.md-content p{margin-bottom:.75rem}
.md-content strong{color:#e2e8f0;font-weight:800}
.md-content em{color:#a5b4fc}
.md-content ol,.md-content ul{padding-left:1.25rem;margin-bottom:.75rem}
.md-content li{margin-bottom:.35rem}
.md-content hr{border-color:#374151;margin:1rem 0}
.md-content code{background:#1f232d;color:#60a5fa;padding:.15rem .4rem;border-radius:.35rem;font-size:.8em}
.md-content blockquote{border-left:3px solid var(--blue);padding-left:1rem;color:#9ca3af;margin:.75rem 0}

/* Confirm Modal */
.confirm-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1rem}
.confirm-panel{background:var(--card);border:1px solid rgba(239,68,68,.25);border-radius:1.5rem;width:100%;max-width:400px;padding:2rem;animation:slideUp .25s cubic-bezier(.16,1,.3,1)}

/* Wave Loader */
.wave-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:1.5rem}
.wave-txt{position:relative;font-size:3.5rem;font-weight:900;letter-spacing:-2px;color:rgba(31,35,45,.8);text-transform:uppercase}
.wave-txt::after{content:"PURTV";position:absolute;left:0;top:0;width:100%;height:100%;color:var(--blue);overflow:hidden;animation:waveFill 2.5s ease-in-out infinite;border-bottom:4px solid var(--blue);filter:drop-shadow(0 0 10px rgba(59,130,246,.5))}
@keyframes waveFill{0%,100%{height:0%;filter:hue-rotate(0)}50%{height:100%;filter:hue-rotate(20deg)}}
.wave-sub{font-size:10px;font-weight:900;color:var(--blue);text-transform:uppercase;letter-spacing:.4em;opacity:.6;animation:pulse 1.5s infinite}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}

/* Initial Splash Screen */
#pur-splash {
  position: fixed;
  inset: 0;
  background: #0f1117;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.4s ease-out, visibility 0.4s;
}
#pur-splash.fade-out {
  opacity: 0;
  visibility: hidden;
}

/* Trash */
.trash-in{animation:trashIn .3s ease}
@keyframes trashIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body class="text-gray-200 font-sans antialiased">

<div id="pur-splash">
  <div class="wave-wrap">
    <div class="wave-txt">PurTV</div>
    <div class="wave-sub">Initializing App...</div>
  </div>
</div>

<header class="hidden md:block bg-[#161922] border-b border-gray-800 sticky top-0 z-50">
  <div class="container mx-auto px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-2 cursor-pointer" @click="go('home')">
      <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-500/20"><i class="fas fa-tv text-white"></i></div>
      <span class="text-2xl font-black text-white tracking-tighter">Pur<span class="text-blue-500">TV</span></span>
    </div>
    <nav class="flex gap-8 items-center font-bold text-sm uppercase tracking-widest">
      <template x-for="n in navLinks" :key="n.view">
        <a href="#" @click.prevent="go(n.view)" :class="isActive(n.match)?'text-blue-500':'text-gray-400 hover:text-blue-400'" class="transition flex items-center gap-1.5">
          <i :class="n.icon+' text-xs'" x-show="n.icon"></i><span x-text="n.label"></span>
          <span x-show="n.view==='history' && watchHistory.length>0" class="bg-blue-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full" x-text="watchHistory.length"></span>
        </a>
      </template>
    </nav>
    <div class="flex items-center gap-3">
      <button @click="go('schedule')" class="w-10 h-10 flex items-center justify-center bg-[#0f1117] border border-gray-700 rounded-xl text-gray-400 hover:text-blue-500 hover:border-blue-500 transition shadow-sm" title="Jadwal Rilis">
        <i class="fas fa-calendar-day"></i>
      </button>
      <div class="relative w-64" @click.away="showSuggestions=false">
        <input type="text" x-model="searchQuery" @input.debounce.300ms="fetchSuggestions()" @keyup.enter="startSearch()" @focus="suggestions.length>0&&(showSuggestions=true)" placeholder="Cari donghua..." class="w-full bg-[#0f1117] border border-gray-700 rounded-xl py-2 px-4 pl-11 focus:outline-none focus:border-blue-500 text-sm transition">
        <i class="fas fa-search absolute left-4 top-3 text-gray-500"></i>
        <div x-show="showSuggestions&&suggestions.length>0" x-transition x-cloak class="absolute top-full left-0 right-0 mt-2 bg-[#161922] border border-gray-800 rounded-xl overflow-hidden z-[60] shadow-2xl">
          <template x-for="s in suggestions" :key="s">
            <div @click="searchQuery=s;startSearch()" class="px-4 py-2.5 hover:bg-blue-600/10 cursor-pointer text-[11px] font-bold text-gray-400 hover:text-blue-400 border-b border-gray-800/50 last:border-0 transition-colors" x-text="s"></div>
          </template>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="md:hidden bg-[#161922] p-4 flex justify-between items-center sticky top-0 z-50 border-b border-gray-800">
  <span class="text-xl font-black text-white tracking-tighter cursor-pointer flex items-center gap-2" @click="go('home')">
    <i class="fas fa-tv text-blue-500"></i>
    <span>Pur<span class="text-blue-500">TV</span></span>
  </span>
  <div class="flex items-center gap-2">
    <button @click="go('schedule')" class="w-10 h-10 flex items-center justify-center bg-[#1f232d] rounded-xl text-gray-400"><i class="fas fa-calendar-day"></i></button>
    <button @click="showSearch=!showSearch" class="w-10 h-10 flex items-center justify-center bg-[#1f232d] rounded-full text-gray-400"><i class="fas fa-search"></i></button>
  </div>
</div>

<div x-show="showSearch" x-transition x-cloak class="md:hidden fixed top-[65px] left-0 right-0 z-50 p-4 bg-[#1f232d] border-b border-gray-800 shadow-2xl" @click.away="showSuggestions=false">
  <input type="text" x-model="searchQuery" @input.debounce.300ms="fetchSuggestions()" @keyup.enter="startSearch();showSearch=false" @keyup.escape="showSearch=false" placeholder="Ketik judul donghua..." class="w-full bg-[#0f1117] border border-gray-700 rounded-xl py-3 px-4 focus:border-blue-500 outline-none text-sm" x-ref="searchInput" x-effect="showSearch&&$nextTick(()=>$refs.searchInput.focus())">
  <div x-show="showSuggestions&&suggestions.length>0" class="mt-2 bg-[#161922] border border-gray-800 rounded-xl overflow-hidden shadow-2xl">
    <template x-for="s in suggestions" :key="s">
      <div @click="searchQuery=s;startSearch();showSearch=false" class="px-4 py-3 hover:bg-blue-600/10 cursor-pointer text-xs font-bold text-gray-400 hover:text-blue-400 border-b border-gray-800/50 last:border-0" x-text="s"></div>
    </template>
  </div>
</div>

<!-- MAIN -->
<main class="container mx-auto px-4 py-8">

  <div x-show="loading" x-cloak>
    <div class="wave-wrap">
      <div class="wave-txt">PurTV</div>
      <div class="wave-sub">Sedang Memuat Pengalaman Anda...</div>
    </div>
  </div>

  <div x-show="!loading">

    <!-- ===== HOME ===== -->
    <template x-if="page==='home'">
      <div class="space-y-12">
        <!-- Featured Banner -->
        <div class="relative rounded-[2rem] overflow-hidden h-[300px] md:h-[450px] shadow-2xl group/banner border border-white/5">
          <template x-if="homeData.featuredSlider && homeData.featuredSlider.length > 0">
            <div class="h-full relative overflow-hidden transition-all duration-500" :style="'box-shadow: inset 0 -120px 100px -20px ' + (homeData.featuredSlider[sliderIndex].color || '#3b82f6') + '22'">
              <img :src="homeData.featuredSlider[sliderIndex].thumbnail" class="w-full h-full object-cover brightness-[0.4] transition-all duration-700 scale-105">
              <div class="absolute inset-0 bg-gradient-to-t from-[#0f1117] via-transparent p-6 md:p-16 flex flex-col justify-end">
                <div class="mb-4 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 backdrop-blur-md border border-white/10 w-max animate-bounce">
                   <span class="w-2 h-2 rounded-full animate-pulse bg-blue-500"></span>
                   <span class="text-[10px] font-black uppercase tracking-widest text-white">Rekomendasi Minggu Ini</span>
                </div>
                <h2 class="text-3xl md:text-5xl font-black text-white mb-2 transition-all" x-text="cleanTitle(homeData.featuredSlider[sliderIndex].title)" :style="'text-shadow: 0 0 30px ' + (homeData.featuredSlider[sliderIndex].color || '#3b82f6') + '66'"></h2>
                <p class="text-gray-400 text-sm max-w-2xl line-clamp-2 mb-6" x-text="homeData.featuredSlider[sliderIndex].description"></p>
                <button @click="go('detail', homeData.featuredSlider[sliderIndex].url)" 
                  class="w-max px-8 py-3 rounded-xl font-black transition-all hover:scale-110 active:scale-95 shadow-2xl text-white bg-blue-600 shadow-blue-600/30">
                  <i class="fas fa-play-circle mr-2"></i>Tonton Sekarang
                </button>
              </div>
              
              <!-- Slider Navigation Buttons -->
              <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 flex justify-between items-center z-20 pointer-events-none">
                <button @click="prevSlide()" class="w-10 h-10 md:w-14 md:h-14 flex items-center justify-center bg-black/40 hover:bg-white text-white hover:text-black rounded-full backdrop-blur-xl transition-all duration-300 pointer-events-auto border border-white/10 shadow-2xl">
                  <i class="fas fa-chevron-left"></i>
                </button>
                <button @click="nextSlide()" class="w-10 h-10 md:w-14 md:h-14 flex items-center justify-center bg-black/40 hover:bg-white text-white hover:text-black rounded-full backdrop-blur-xl transition-all duration-300 pointer-events-auto border border-white/10 shadow-2xl">
                  <i class="fas fa-chevron-right"></i>
                </button>
              </div>

              <!-- Slider Dots -->
              <div class="absolute top-8 right-8 flex gap-2 z-20">
                <template x-for="(s, i) in homeData.featuredSlider" :key="i">
                  <div @click="sliderIndex = i" class="h-2 rounded-full transition-all duration-500 cursor-pointer border border-white/10 shadow-lg" 
                    :class="sliderIndex === i ? 'w-10 bg-blue-600' : 'w-2 bg-white/20 hover:bg-white/40'"></div>
                </template>
              </div>
            </div>
          </template>
        </div>

        <!-- Popular Today -->
        <section>
          <div class="sec-head"><i class="fas fa-fire text-orange-500 text-xl"></i><h3 class="text-xl font-black uppercase italic tracking-wider">Populer Hari Ini</h3></div>
          <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <template x-for="(item,i) in (homeData.popularToday||[])" :key="'pop-'+i">
              <div @click="go('stream',item.url)" class="relative group cursor-pointer overflow-hidden rounded-2xl border border-white/5 hover:border-blue-500/50 transition-all duration-300 hover:shadow-lg hover:shadow-blue-500/10">
                <img :src="item.thumbnail" class="w-full aspect-video object-cover group-hover:scale-110 transition duration-700 brightness-75 group-hover:brightness-100">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0f1117] via-transparent to-transparent opacity-80"></div>
                <div class="absolute inset-0 flex flex-col justify-end p-3">
                  <p class="text-[9px] font-black text-blue-400 uppercase tracking-tighter" x-text="item.episode"></p>
                  <h4 class="text-xs font-black line-clamp-1 group-hover:text-blue-400 transition" x-text="cleanTitle(item.title)"></h4>
                </div>
                <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                   <div class="bg-blue-600 rounded-full p-1.5 shadow-lg"><i class="fas fa-play text-[8px] text-white"></i></div>
                </div>
              </div>
            </template>
          </div>
        </section>

        <!-- Latest + Sidebar -->
        <div class="flex flex-col lg:flex-row gap-10">
          <div class="lg:w-3/4">
            <div class="sec-head"><div class="h-6 w-1.5 bg-blue-600 rounded-full"></div><h3 class="text-xl font-black uppercase italic">Update Terbaru</h3></div>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">
              <template x-for="(item,i) in (homeData.latestReleases||[])" :key="'lat-'+i">
                <div @click="go('stream',item.url)" class="card-poster group">
                  <div class="relative aspect-poster overflow-hidden">
                    <img :src="item.thumbnail" class="w-full h-full object-cover">
                    <div class="ep-badge bg-blue-600" x-text="item.episode"></div>
                    <div class="play-overlay"><div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-2xl scale-75 group-hover:scale-100 transition-transform duration-300"><i class="fas fa-play text-white text-xl ml-1"></i></div></div>
                  </div>
                  <div class="p-3"><h4 class="text-[11px] font-bold line-clamp-2 group-hover:text-blue-400 transition" x-text="cleanTitle(item.title)"></h4></div>
                </div>
              </template>
            </div>
          </div>
          <!-- Sidebar Ongoing -->
          <div class="lg:w-1/4">
            <div class="bg-[#161922] rounded-[2rem] p-6 border border-gray-800 sticky top-24">
              <h3 class="text-sm font-black uppercase mb-6 text-blue-500 tracking-widest border-b border-gray-800 pb-2"><i class="fas fa-broadcast-tower mr-2"></i>Series Ongoing</h3>
              <div class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                <template x-for="(item,i) in (homeData.ongoingSidebar||[])" :key="'side-'+i">
                  <div @click="go('stream',item.url)" class="flex items-center gap-3 group cursor-pointer border-b border-gray-800/50 pb-3 last:border-0">
                    <div class="flex-1">
                      <h4 class="text-[11px] font-bold line-clamp-1 group-hover:text-blue-400 transition" x-text="cleanTitle(item.title)"></h4>
                      <p class="text-[9px] text-gray-500 font-bold mt-1" x-text="item.episode"></p>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] text-gray-700 group-hover:text-blue-500"></i>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>

      </div>
    </template>

    <!-- ===== GENRES ===== -->
    <template x-if="page==='genres'">
      <div class="max-w-4xl mx-auto">
        <h2 class="text-2xl font-black mb-10 text-center uppercase tracking-widest"><i class="fas fa-layer-group text-blue-500 mr-3"></i>Telusuri Genre</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
          <template x-for="g in allGenres" :key="g.slug">
            <button @click="go('genre',g.slug)" class="bg-[#161922] hover:bg-blue-600 border border-gray-800 p-4 rounded-xl text-xs font-black transition flex items-center justify-center gap-2">
              <i class="fas fa-tag text-blue-400 group-hover:text-white text-[10px]"></i><span x-text="g.name"></span>
            </button>
          </template>
        </div>
      </div>
    </template>

    <!-- ===== RESULTS ===== -->
    <template x-if="page==='results'">
      <div>
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-xl font-black uppercase italic" x-text="searchTitle"></h2>
          <div class="text-[10px] font-black text-gray-500 bg-[#161922] px-3 py-1 rounded-lg"><i class="fas fa-file-alt mr-1"></i>Hal <span x-text="currentPage"></span></div>
        </div>
        <!-- Empty State -->
        <div x-show="listData.length===0" class="flex flex-col items-center justify-center py-20 text-center">
          <div class="w-20 h-20 rounded-[2rem] bg-[#161922] border border-gray-800 flex items-center justify-center mb-6 text-gray-700">
            <i class="fas fa-search text-3xl"></i>
          </div>
          <h3 class="text-lg font-black text-gray-500 uppercase tracking-widest mb-2">Hasil Tidak Ditemukan</h3>
          <p class="text-[10px] text-gray-600 font-bold max-w-xs uppercase tracking-[.2em] leading-loose">Coba gunakan kata kunci lain.</p>
        </div>
        <!-- Grid -->
        <div x-show="listData.length>0" class="grid-r">
          <template x-for="(item,i) in listData" :key="'res-'+i">
            <div @click="go('detail',item.url)" class="card-poster group">
              <div class="relative aspect-poster">
                <img :src="item.thumbnail" class="w-full h-full object-cover">
                <div class="absolute bottom-2 right-2 bg-black/80 backdrop-blur-md px-2 py-0.5 rounded text-[9px] font-black text-yellow-500 uppercase border border-white/10" x-text="item.type"></div>

    setTheme(t) {
      this.theme = t;
      localStorage.setItem('puruTV_theme', t);
      if (t === 'custom') localStorage.setItem('puruTV_customColor', this.customColor);
      if (t === 'rainbow') {
        const rb = Array.from({length:4}, () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'));
        localStorage.setItem('puruTV_rainbow', JSON.stringify(rb));
      }
      this.applyTheme();
    },

    hexToRgb(hex) {
      let r = 0, g = 0, b = 0;
      hex = hex.replace('#', '');
      if (hex.length === 3) {
        r = parseInt(hex[0] + hex[0], 16);
        g = parseInt(hex[1] + hex[1], 16);
        b = parseInt(hex[2] + hex[2], 16);
      } else {
        r = parseInt(hex.substring(0, 2), 16);
        g = parseInt(hex.substring(2, 4), 16);
        b = parseInt(hex.substring(4, 6), 16);
      }
      return `${r}, ${g}, ${b}`;
    },

    applyTheme() {
      const themes = ['theme-blue', 'theme-emerald', 'theme-purple', 'theme-rose', 'theme-amber', 'theme-custom', 'theme-rainbow'];
      document.body.classList.remove(...themes);
      
      if(this.theme === 'custom') {
        document.body.style.setProperty('--c-color', this.customColor);
        document.body.style.setProperty('--c-rgb', this.hexToRgb(this.customColor));
        document.body.classList.add('theme-custom');
      } else if(this.theme === 'rainbow') {
        let rb = JSON.parse(localStorage.getItem('puruTV_rainbow') || '["#ef4444","#10b981","#3b82f6","#f59e0b"]');
        rb.forEach((c, i) => {
          document.body.style.setProperty(`--rb-${i+1}`, c);
          document.body.style.setProperty(`--rb-${i+1}-rgb`, this.hexToRgb(c));
        });
        document.body.classList.add('theme-rainbow');
      } else if(this.theme !== 'blue') {
        document.body.classList.add('theme-' + this.theme);
      }
    },

    cleanTitle(t) { return t ? t.split('\t')[0].trim() : ''; },

    formatDate(iso, type='full') {
      if (!iso) return '-';
      const d=new Date(iso), diff=(Date.now()-d)/60000;
      if (type==='time') return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
      if (type==='short') {
        if (diff<1) return 'Baru saja';
        if (diff<60) return `${Math.floor(diff)} mnt lalu`;
        if (diff<1440) return `${Math.floor(diff/60)} jam lalu`;
        return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'});
      }
      return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
    },

    async routeHandler() {
      const [view,query] = (window.location.hash||'#home').split('?');
      const params = new URLSearchParams(query||'');
      const url=params.get('url'), slug=params.get('slug'), q=params.get('q'), page=+params.get('page')||1;
      Object.assign(this,{homeData:{},animeDetail:{},streamData:{},listData:[],scheduleData:[],loading:true,aiPanel:false,currentPage:page});
      try {
        this.page = view.slice(1)||'home';
        if      (this.page==='home')     await this.fetchHome();
        else if (this.page==='detail')   await this.fetchDetail(url);
        else if (this.page==='stream')   await this.fetchStream(url);
        else if (this.page==='schedule') await this.fetchSchedule();
        else if (this.page==='genres')   await this.fetchGenres();
        else if (this.page==='genre')    { this.page='results'; await this.fetchByGenre(slug,page); }
        else if (this.page==='search')   { this.page='results'; await this.fetchSearch(q,page); }
        else if (this.page==='trash')    this._purgeExpiredTrash();
      } catch(e){ console.error(e); }
      this.loading=false; window.scrollTo(0,0);
    },

    go(view, paramValue) {
      if (view === 'schedule') {
        this.showSchedulePanel = true;
        if (!this.scheduleData.length) this.fetchSchedule();
        return;
      }
      if (view==='detail'||view==='stream') {
        let p = paramValue||'';
        if (p.includes('url=')) p = p.split('url=')[1];
        else if (p.includes('://')) { try { p = new URL(p).pathname; } catch(e){} }
        window.location.hash = `#${view}?url=${encodeURIComponent(p)}`;
      } else if (view==='genre') {
        window.location.hash = `#genre?slug=${paramValue}&page=1`;
      } else {
        window.location.hash = `#${view}`;
      }
    },

    changePage(n) {
      const params=new URLSearchParams(window.location.hash.split('?')[1]);
      params.set('page',n);
      window.location.hash = `${window.location.hash.split('?')[0]}?${params}`;
    },

    async fetchSuggestions() {
      if (this.searchQuery.length<2) { this.suggestions=[]; this.showSuggestions=false; return; }
      try {
        const d=await fetch(`https://puruboy-api.vercel.app/api/search/suggest?q=${encodeURIComponent(this.searchQuery)}`).then(r=>r.json());
        if (d.success) { this.suggestions=d.result; this.showSuggestions=true; }
      } catch(e){}
    },

    startSearch() {
      if (this.searchQuery.length<2) return;
      window.location.hash=`#search?q=${this.searchQuery}&page=1`;
      this.searchQuery=''; this.suggestions=[]; this.showSuggestions=false;
    },

    parseAIJson(raw) {
      let s=raw.trim().replace(/^```(?:json)?\s*/i,'').replace(/\s*```\s*$/,'').trim();
      const a=s.indexOf('{'),b=s.lastIndexOf('}');
      if (a===-1||b===-1) return null;
      try {
        const p=JSON.parse(s.substring(a,b+1));
        return { respon:p.respon||p.response||p.jawaban||'', choice:Array.isArray(p.choice)?p.choice:[] };
      } catch(e){ return null; }
    },

    async openAIPanel(title) {
      this.aiTitle=this.cleanTitle(title); this.aiPanel=true; this.aiLoading=true;
      this.aiResult=''; this.aiError=''; this.aiChoices.splice(0);
      const t=this.currentType;
      await this._sendAIMessage(`Kamu adalah asisten AI spesialis ${t.toLowerCase()}. Jawab dalam Bahasa Indonesia. HANYA balas dengan JSON valid tanpa teks lain. Format: {"respon":"<markdown>","choice":["<p1>","<p2>","<p3>"]}. Pertanyaan: ${t} "${this.aiTitle}" menceritakan tentang apa? Jelaskan sinopsis, karakter, tema, hal menarik.`);
    },

    async askFollowUp(choice) {
      if (this.aiLoading) return;
      this.aiLoading=true; this.aiChoices.splice(0);
      const t=this.currentType;
      await this._sendAIMessage(`Kamu adalah asisten AI spesialis ${t.toLowerCase()}. Bahasa Indonesia. HANYA JSON valid. Format: {"respon":"<markdown>","choice":["<p1>","<p2>","<p3>"]}. Konteks: ${t.toLowerCase()} "${this.aiTitle}". Pertanyaan: ${choice}`);
    },

    async _sendAIMessage(prompt) {
      try {
        const d=await fetch('https://puruboy-api.vercel.app/api/ai/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})}).then(r=>r.json());
        if (d.success&&d.result?.answer) {
          const parsed=this.parseAIJson(d.result.answer);
          const hasMarked = typeof marked !== 'undefined';
          if (parsed?.respon) { 
            this.aiResult = hasMarked ? marked.parse(parsed.respon) : parsed.respon; 
            this.aiChoices.splice(0,this.aiChoices.length,...parsed.choice); 
          } else { 
            this.aiResult = hasMarked ? marked.parse(d.result.answer) : d.result.answer; 
            this.aiChoices.splice(0); 
          }
        } else { this.aiError='Gagal mendapat respons AI. Silakan coba lagi.'; }
      } catch(e){ this.aiError='Koneksi gagal. Pastikan internet aktif.'; }
      finally { this.aiLoading=false; }
    },

    _saveAll() {
      localStorage.setItem('puruTV_history',JSON.stringify(this.watchHistory));
      localStorage.setItem('puruTV_trash',  JSON.stringify(this.trashHistory));
    },

    _purgeExpiredTrash() {
      const limit=3*24*60*60*1000;
      this.trashHistory=this.trashHistory.filter(i=>i.deletedAt&&(Date.now()-new Date(i.deletedAt).getTime())<limit);
      localStorage.setItem('puruTV_trash',JSON.stringify(this.trashHistory));
    },

    trashExpiry(deletedAt) {
      if (!deletedAt) return '';
      const diff=new Date(new Date(deletedAt).getTime()+3*24*60*60*1000)-Date.now();
      if (diff<=0) return 'Kedaluwarsa';
      const h=Math.floor(diff/3600000);
      return h<24?`Hapus dalam ${h}j`:`Hapus dalam ${Math.floor(h/24)}h`;
    },

    saveHistory() {
      const s=this.streamData;
      if (!s?.series) return;
      const seriesTitle=this.cleanTitle(s.series), episode=s.title||'', watchedAt=new Date().toISOString();
      const urlParam=new URLSearchParams((window.location.hash.split('?')[1]||'')).get('url')||'';
      let epNum='';
      const m=urlParam.match(/episode-(\d+)/);
      if (m) epNum='Ep. '+m[1];
      else if (episode.toLowerCase().includes('episode')) epNum='Ep. '+(episode.split(/episode/i)[1]||'').trim().split(' ')[0];
      const idx=this.watchHistory.findIndex(h=>h.seriesTitle===seriesTitle);
      if (idx!==-1) this.watchHistory.splice(idx,1);
      this.watchHistory.unshift({seriesTitle,episode,epNum,watchedAt,url:urlParam});
      if (this.watchHistory.length>20) this.watchHistory.length=20;
      this._saveAll();
    },

    _confirm(opts) { this.confirmModal={show:true,...opts}; },

    confirmRemoveHistory(i) {
      this._confirm({danger:true,title:'Hapus Riwayat?',subtitle:this.watchHistory[i].seriesTitle,message:'History ini akan dipindahkan ke Tong Sampah dan bisa dikembalikan dalam 3 hari.',confirmText:'Pindah ke Sampah',action:()=>this.removeHistory(i)});
    },
    confirmClearHistory() {
      this._confirm({danger:true,title:'Hapus Semua Riwayat?',subtitle:`${this.watchHistory.length} riwayat akan dihapus`,message:'Semua history akan dipindahkan ke Tong Sampah selama 3 hari.',confirmText:'Hapus Semua',action:()=>this.clearHistory()});
    },
    confirmEmptyTrash() {
      this._confirm({danger:true,title:'Kosongkan Tong Sampah?',subtitle:`${this.trashHistory.length} item dihapus permanen`,message:'Tindakan ini tidak bisa dibatalkan.',confirmText:'Hapus Permanen',action:()=>this.emptyTrash()});
    },
    confirmDeletePermanent(i) {
      this._confirm({danger:true,title:'Hapus Permanen?',subtitle:this.trashHistory[i].seriesTitle,message:'History ini akan dihapus selamanya dan tidak bisa dikembalikan.',confirmText:'Hapus Permanen',action:()=>{this.trashHistory.splice(i,1);this._saveAll();}});
    },

    removeHistory(i) { const [r]=this.watchHistory.splice(i,1); r.deletedAt=new Date().toISOString(); this.trashHistory.unshift(r); this._saveAll(); },
    clearHistory() { const now=new Date().toISOString(); this.trashHistory.unshift(...this.watchHistory.map(h=>({...h,deletedAt:now}))); this.watchHistory=[]; this._saveAll(); },
    restoreFromTrash(i) {
      const item={...this.trashHistory[i]}; delete item.deletedAt; this.trashHistory.splice(i,1);
      const dup=this.watchHistory.findIndex(h=>h.seriesTitle===item.seriesTitle);
      if (dup!==-1) this.watchHistory.splice(dup,1);
      this.watchHistory.unshift(item); if (this.watchHistory.length>20) this.watchHistory.length=20; this._saveAll();
    },
    restoreAllTrash() {
      this.trashHistory.forEach(item=>{const c={...item};delete c.deletedAt;const d=this.watchHistory.findIndex(h=>h.seriesTitle===c.seriesTitle);if(d!==-1)this.watchHistory.splice(d,1);this.watchHistory.unshift(c);});
      if (this.watchHistory.length>20) this.watchHistory.length=20; this.trashHistory=[]; this._saveAll();
    },
    emptyTrash() { this.trashHistory=[]; this._saveAll(); },

    exportHistory() {
      const blob=new Blob([JSON.stringify({exported:new Date().toISOString(),version:1,history:this.watchHistory},null,2)],{type:'application/json'});
      const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`puruTV-history-${new Date().toISOString().slice(0,10)}.json`});
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    },

    importHistory(event) {
      const file=event.target.files[0]; if (!file) return;
      const r=new FileReader();
      r.onload=e=>{
        try {
          const parsed=JSON.parse(e.target.result), items=parsed.history||(Array.isArray(parsed)?parsed:null);
          if (!items) throw new Error();
          let added=0;
          items.forEach(item=>{ if(!item.seriesTitle)return; const d=this.watchHistory.findIndex(h=>h.seriesTitle===item.seriesTitle); if(d!==-1)this.watchHistory.splice(d,1); this.watchHistory.push(item); added++; });
          this.watchHistory.sort((a,b)=>new Date(b.watchedAt)-new Date(a.watchedAt));
          if (this.watchHistory.length>20) this.watchHistory.length=20;
          this._saveAll(); this._showToast(true,`${added} riwayat berhasil diimpor!`);
        } catch(e){ this._showToast(false,'File tidak valid atau rusak.'); }
        event.target.value='';
      };
      r.readAsText(file);
    },

    _showToast(ok,msg) { this.importToast={show:true,ok,msg}; setTimeout(()=>this.importToast.show=false,3000); },

    clearAppData() {
      this._confirm({
        danger: true,
        title: 'Reset Aplikasi?',
        subtitle: 'Semua data akan dihapus',
        message: 'Tindakan ini akan menghapus seluruh riwayat nonton, daftar sampah, dan preferensi server yang tersimpan di browser ini secara permanen.',
        confirmText: 'Hapus Permanen',
        action: () => {
          localStorage.removeItem('puruTV_history');
          localStorage.removeItem('puruTV_trash');
          localStorage.removeItem('puruTV_preferredServer');
          this.watchHistory = [];
          this.trashHistory = [];
          this.preferredServerHost = '';
          this._showToast(true, 'Data berhasil dibersihkan!');
          this.go('home');
        }
      });
    },

    async fetchHome() { const d=await fetch('https://puruboy-api.vercel.app/api/anime/anichin/home').then(r=>r.json()); this.homeData=d.result; },
    async fetchGenres() { const d=await fetch('https://puruboy-api.vercel.app/api/anime/anichin/genres').then(r=>r.json()); this.allGenres=d.result; },
    async fetchByGenre(slug,page) {
      this.searchTitle=`Genre: ${slug.replace(/-/g,' ')}`;
      const d=await fetch(`https://puruboy-api.vercel.app/api/anime/anichin/genre?slug=${slug}&page=${page}`).then(r=>r.json());
      this.listData=d.result.data; this.hasNextPage=d.result.hasNextPage;
    },
    async fetchSearch(q,page) {
      this.searchTitle=`Hasil Cari: ${q}`;
      const d=await fetch(`https://puruboy-api.vercel.app/api/anime/anichin/search?q=${q}&page=${page}`).then(r=>r.json());
      this.listData=d.result.data;
      this.hasNextPage=d.result.hasNextPage;
    },
    async fetchDetail(url) {
      const d=await fetch(`https://puruboy-api.vercel.app/api/anime/anichin/detail?url=${encodeURIComponent(decodeURIComponent(url))}`).then(r=>r.json());
      this.animeDetail=d.result;
    },
    async fetchStream(url) {
      const rawUrl=decodeURIComponent(url);
      const d=await fetch(`https://puruboy-api.vercel.app/api/anime/anichin/stream?url=${encodeURIComponent(rawUrl)}`).then(r=>r.json());
      this.streamData=d.result;
      const links=this.streamData.streamingLinks||[];
      const pref=links.findIndex(s=>s.server===this.preferredServerHost);
      const start=pref!==-1?links[pref]:(links[0]||null);
      if (start) this.changeServer(start.link,start.server,start.isProxy);
      this.saveHistory();
    },
    async fetchSchedule() {
      try {
        const a=await fetch('https://puruboy-api.vercel.app/api/anime/anichin/schedule').then(r=>r.json());
        if (a.success) this.scheduleData=a.result;
      } catch(e){}
    },
    async changeServer(link,serverName,isProxy=false) {
      this.preferredServerHost=serverName;
      localStorage.setItem('puruTV_preferredServer',serverName);
      if (isProxy) {
        try { const d=await fetch(link).then(r=>r.json()); this.activeServer=d.result.embed_url; }
        catch(e){}
      } else { this.activeServer=link; }
    }
  }
}
</script>
